[Server]
Host = "localhost"
Port = 8080
EnableSsl = true

[Database]
ConnectionString = "Server=myServerAddress;Database=myDataBase;User Id=myUsername;Password=myPassword;"
MaxConnections = 100
AllowedUsers = ["admin", "service", "readonly"]


[Features]
EnableLogging = true
LogLevel = "INFO"
CacheTimeoutMinutes = 30